<!DOCTYPE html>
<html lang="en">
<head>

    <title>Image Grid Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section>
            <img src="images/foggy-beach.avif" alt="Foggy Beach">

</html>
